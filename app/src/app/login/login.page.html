<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Entrar no Sistema</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <form (ngSubmit)="login()">
        <ion-item>
          <ion-label position="floating">Usuário</ion-label>
          <ion-input [(ngModel)]="username" name="username" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Senha</ion-label>
          <ion-input [(ngModel)]="password" name="password" type="password" required></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" [disabled]="!username || !password">
          Entrar
        </ion-button>
      </form>

      <ion-button expand="block" fill="outline" (click)="toggleMode()">
        {{ isLoginMode ? 'Cadastrar-se' : 'Voltar ao Login' }}
      </ion-button>

      <div *ngIf="!isLoginMode">
        <form (ngSubmit)="register()">
          <ion-item>
            <ion-label position="floating">Novo Usuário</ion-label>
            <ion-input [(ngModel)]="newUsername" name="newUsername" required></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Nova Senha</ion-label>
            <ion-input [(ngModel)]="newPassword" name="newPassword" type="password" required></ion-input>
          </ion-item>

          <ion-button expand="block" type="submit" [disabled]="!newUsername || !newPassword">
            Cadastrar
          </ion-button>
        </form>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
